<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roulette ohne Grün</title>
  <style>
    :root{
      --size:420px;
      --accent:#0066cc;
      --bg:#0f1720;
      --panel:#0b1220;
      --text:#e6eef8;
      --nav-height:64px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#08111a 0%,#07121a 100%);color:var(--text)}
    body{display:flex;align-items:flex-start;justify-content:center;padding:20px;padding-top:calc(var(--nav-height) + 20px)}

    /* Top Navigation */
    .topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:rgba(6,10,20,0.95);border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;z-index:60;padding:0 18px}
    .topnav .brand{font-weight:800;margin-right:24px}
    .topnav nav{display:flex;gap:12px}
    .topnav a{color:var(--text);text-decoration:none;padding:8px 12px;border-radius:8px;font-weight:600}
    .topnav a:hover{background:rgba(255,255,255,0.02)}

    .app{width:100%;max-width:1100px;display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
    .card{background:rgba(255,255,255,0.03);padding:18px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
    .left{display:flex;flex-direction:column;align-items:center;gap:14px}
    .wheel-wrap{position:relative;width:var(--size);height:var(--size);display:flex;align-items:center;justify-content:center}
    .wheel{width:92%;height:92%;border-radius:50%;box-shadow:0 8px 30px rgba(2,6,23,0.8);transition:transform 5s cubic-bezier(.15,.9,.25,1);position:relative;overflow:visible;border:6px solid rgba(255,255,255,0.03)}
    .pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:24px solid #ffef00;border-radius:2px;z-index:5;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6))}
    .center{position:absolute;width:84px;height:84px;border-radius:50%;background:#071728;display:flex;align-items:center;justify-content:center;border:6px solid rgba(255,255,255,0.03);z-index:3}
    .center .num{font-weight:700;font-size:20px}
    .labels{position:absolute;inset:0;border-radius:50%;pointer-events:none}
    .labels span{position:absolute;left:50%;top:50%;transform-origin:0 calc(var(--size)/2);color:#fff;font-size:12px;padding:2px 6px;background:rgba(0,0,0,0.25);border-radius:6px;white-space:nowrap}
    .controls{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:8px;align-items:center}
    input[type="number"],select{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text);min-width:0}
    button{background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600}
    button[disabled]{opacity:0.5;cursor:default}
    .sidebar{display:flex;flex-direction:column;gap:12px}
    .balance{font-size:20px;font-weight:700}
    .history{max-height:180px;overflow:auto;padding:8px;background:rgba(255,255,255,0.02);border-radius:8px}
    .history div{padding:6px;border-bottom:1px dashed rgba(255,255,255,0.03);font-size:13px}
    .result{font-weight:700;font-size:18px;padding:8px 10px;border-radius:8px;background:linear-gradient(90deg,#071728,#04202a);display:inline-block}
    @media(max-width:980px){.app{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <header class="topnav" role="navigation">
    <div class="brand">Meine Spiele</div>
    <nav>
      <a href="#">Startseite</a>
      <a href="#">Blackjack</a>
      <a href="#">Slots</a>
      <a href="#">Pong</a>
      <a href="#">Highscores</a>
    </nav>
  </header>

  <div class="app" role="main">
    <div class="card left">
      <div class="wheel-wrap" aria-hidden="true">
        <div class="pointer" title="Pointer"></div>
        <div id="wheel" class="wheel"></div>
        <div class="center"><div class="num" id="resultNum">—</div></div>
        <div id="labels" class="labels" style="--size:420px"></div>
      </div>

      <div class="controls" style="width:100%;max-width:720px">
        <div class="row">
          <label style="min-width:80px">Einsatz</label>
          <input id="betAmount" type="number" min="1" value="10" />
          <label style="min-width:60px">Typ</label>
          <select id="betType">
            <option value="color">Farbe</option>
            <option value="number">Zahl</option>
          </select>
          <select id="betColor">
            <option value="red">Rot</option>
            <option value="black">Schwarz</option>
          </select>
          <input id="betNumber" type="number" min="1" max="36" value="7" style="display:none;width:80px" />
        </div>

        <div class="row">
          <button id="spinBtn">Spin</button>
          <div style="flex:1"></div>
          <div>Letzte Zahl: <span id="lastNum">—</span></div>
        </div>
      </div>
    </div>

    <div class="card sidebar">
      <div class="balance">Guthaben: <span id="balance">1000</span> €</div>
      <div>Ergebnis: <span id="result" class="result">—</span></div>

      <div>
        <div style="font-weight:700;margin-bottom:6px">Auszahlungstabelle</div>
        <ul style="margin:8px 0 0 18px;padding:0">
          <li><strong>Zahl</strong>: 35:1</li>
          <li><strong>Farbe</strong>: 1:1</li>
        </ul>
      </div>

      <div>
        <div style="font-weight:700;margin-bottom:6px">Trefferhistorie</div>
        <div id="history" class="history"></div>
      </div>
    </div>
  </div>

  <script>
    // Zahlen 1-36 mit alternierenden Farben (kein 0 / kein Grün)
    const numbers = Array.from({length:36}, (_,i) => {
      const n = i + 1;
      const color = (i % 2 === 0) ? 'red' : 'black';
      return { n, c: color };
    });

    const wheel = document.getElementById('wheel');
    const labels = document.getElementById('labels');
    const seg = 360 / numbers.length;
    const size = 420;

    // conic-gradient für Segmente
    const parts = numbers.map((it, i) => {
      const color = it.c === 'red' ? '#c62828' : '#111827';
      const start = (i * seg).toFixed(6);
      const end = ((i + 1) * seg).toFixed(6);
      return `${color} ${start}deg ${end}deg`;
    });
    wheel.style.background = `conic-gradient(from -90deg, ${parts.join(',')})`;

    // Labels um das Rad
    numbers.forEach((it, i) => {
      const angle = -90 + (i + 0.5) * seg;
      const el = document.createElement('span');
      el.textContent = it.n;
      el.style.transform = `rotate(${angle}deg) translateY(-${size * 0.42}px) rotate(${-angle}deg)`;
      el.style.left = '50%';
      el.style.top = '50%';
      labels.appendChild(el);
    });

    // UI Elemente
    const betType = document.getElementById('betType');
    const betColor = document.getElementById('betColor');
    const betNumber = document.getElementById('betNumber');
    const betAmount = document.getElementById('betAmount');
    const spinBtn = document.getElementById('spinBtn');
    const resultNum = document.getElementById('resultNum');
    const resultLabel = document.getElementById('result');
    const balanceEl = document.getElementById('balance');
    const historyEl = document.getElementById('history');
    const lastNum = document.getElementById('lastNum');

    let balance = 1000;
    let spinning = false;
    let rotation = 0;

    betType.addEventListener('change', () => {
      if (betType.value === 'number') {
        betNumber.style.display = '';
        betColor.style.display = 'none';
      } else {
        betNumber.style.display = 'none';
        betColor.style.display = '';
      }
    });

    function addHistory(text) {
      const d = document.createElement('div');
      d.textContent = text;
      historyEl.prepend(d);
      while (historyEl.children.length > 50) historyEl.removeChild(historyEl.lastChild);
    }

    function updateBalance(v) {
      balance = Math.max(0, Math.round((balance + Number.EPSILON) * 100) / 100 + v);
      balanceEl.textContent = balance.toFixed(2);
    }

    function spinWheel() {
      if (spinning) return;
      const bet = Number(betAmount.value) || 0;
      if (bet <= 0) { alert('Setze einen positiven Betrag'); return; }
      if (bet > balance) { alert('Nicht genug Guthaben'); return; }

      const chosenType = betType.value;
      const chosenColor = betColor.value;
      const chosenNumber = Number(betNumber.value);

      updateBalance(-bet);
      spinBtn.disabled = true;
      spinning = true;

      const winIndex = Math.floor(Math.random() * numbers.length);
      const win = numbers[winIndex];

      const spins = Math.floor(Math.random() * 3) + 3;
      const finalRotation = spins * 360 + (90 - (winIndex + 0.5) * seg);
      rotation = finalRotation;
      wheel.style.transition = 'transform 5s cubic-bezier(.15,.9,.25,1)';
      wheel.style.transform = `rotate(${rotation}deg)`;

      resultLabel.textContent = 'Spinning...';

      wheel.addEventListener('transitionend', function handler() {
        wheel.removeEventListener('transitionend', handler);
        spinning = false;
        spinBtn.disabled = false;

        resultNum.textContent = win.n;
        lastNum.textContent = win.n;
        resultLabel.textContent = `${win.n} ${win.c.toUpperCase()}`;
        addHistory(`Zahl ${win.n} - ${win.c.toUpperCase()} Einsatz ${bet} €`);

        let payout = 0;
        if (chosenType === 'number') {
          if (chosenNumber === win.n) {
            payout = bet * 36;
            addHistory(`Gewinn Zahl! +${payout} €`);
          } else {
            addHistory(`Verloren Zahl -${bet} €`);
          }
        } else if (chosenType === 'color') {
          if (chosenColor === win.c) {
            payout = bet * 2;
            addHistory(`Gewinn Farbe! +${payout} €`);
          } else {
            addHistory(`Verloren Farbe -${bet} €`);
          }
        }

        if (payout > 0) updateBalance(payout);
      }, { once: true });
    }

    spinBtn.addEventListener('click', spinWheel);
    balanceEl.textContent = balance.toFixed(2);
  </script>
</body>
</html>
